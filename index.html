<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Force browsers to revalidate the HTML on every visit so that any
       change pushed to git (new code, bumped asset version) is picked up
       immediately, even by visitors who've been here before. -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Sameie Boden</title>
  <meta name="description" content="Oversikt over felles utstyr og verktøy i Sameie Boden." />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Bedehusveien Sameie</h1>
      <p class="subtitle">Verktøy og utstyr i fellesboden</p>
    </div>
  </header>

  <main class="container">
    <div id="toolbar-mount"></div>
    <section id="controls" class="controls" aria-label="Søk og filter"></section>
    <section id="grid-section"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Mangler noe, eller skal noe legges til? Ta kontakt med Thomas Hetland!</p>
    </div>
  </footer>

  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
