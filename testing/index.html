<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="theme-color" content="#fdfbe5" />
  <title>Sameieboden — Testing</title>
  <meta name="description" content="Test-versjon av Sameieboden med chat aktivert." />
  <meta name="robots" content="noindex" />

  <!-- All asset paths resolved from site root so this page can live in /testing/. -->
  <base href="/" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />

  <!-- iOS home-screen install -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sameieboden Test" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="styles/main.css?v=1778513337" />

  <style>
    /* Subtle "TESTING" ribbon so we always know which version we're on. */
    .testing-ribbon {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      padding: 0.25rem 0.5rem;
      background: #d65a4a;
      color: #fff;
      font: 700 0.78rem/1 "Nunito", system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }
    body { padding-top: 1.6rem; }
  </style>

  <!-- Enable chat before main.js loads. -->
  <script>window.__CHAT_ENABLED = true;</script>
</head>
<body>
  <div class="testing-ribbon" aria-hidden="true">Testing — chat aktivert</div>

  <section class="hero">
    <div class="container hero-inner">
      <div id="ham-mount" class="ham-mount"></div>
      <div id="house-mount" class="house-mount"></div>
      <span class="hero-badge" aria-hidden="true">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" focusable="false">
          <path d="M4 14 L16 4 L28 14 V27 a1 1 0 0 1 -1 1 H5 a1 1 0 0 1 -1 -1 Z" fill="currentColor"/>
        </svg>
      </span>
      <h1 class="hero-title">Sameieboden</h1>
      <p class="hero-lead">Felles utstyr og verktøy i Bedehusvegen sameie</p>
    </div>
  </section>

  <main class="container main">
    <div id="toolbar-mount"></div>
    <section id="controls" class="controls" aria-label="Søk og filter"></section>
    <section id="grid-section" class="grid-section"></section>
  </main>

  <div id="install-mount" class="install-mount"></div>

  <footer class="site-footer">
    <div class="container site-footer-inner">
      <div>
        <p class="footer-title">Mangler noe i listen?</p>
        <p class="footer-text">Ta kontakt med Thomas Hetland</p>
      </div>
      <p class="footer-meta">Bedehusvegen Sameie · Test</p>
      <p class="footer-meta">© Thomas Hetland</p>
    </div>
  </footer>

  <script type="module" src="js/main.js?v=1778513337"></script>
  <script>
    // Service worker for PWA install + offline support.
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
