<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#fdfbe5"/>
  <g transform="translate(256 248) rotate(-4)">
    <!-- Soft drop shadow under the tile (mirrors hero badge box-shadow blur) -->
    <rect x="-160" y="-132" width="320" height="320" rx="72" fill="#5b9d6b" opacity="0.35" filter="url(#tileShadow)"/>
    <!-- Deep-green offset for the chunky 3D edge -->
    <rect x="-160" y="-142" width="320" height="320" rx="72" fill="#5b9d6b"/>
    <!-- Front face of the tile -->
    <rect x="-160" y="-160" width="320" height="320" rx="72" fill="#7fb886"/>
    <!-- House: identical path to the hero badge (32x32 viewBox).
         Hero ratio is 40px icon inside 72px tile (~0.55). Scale = 320 * 0.55 / 32 ≈ 5.5 -->
    <g transform="translate(-88 -88) scale(5.5)" fill="#fff">
      <path d="M4 14 L16 4 L28 14 V27 a1 1 0 0 1 -1 1 H5 a1 1 0 0 1 -1 -1 Z"/>
    </g>
  </g>
  <defs>
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
</svg>
